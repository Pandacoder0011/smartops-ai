version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smartops_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smartops_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartops_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smartops
      - JWT_SECRET=smartops_jwt_secret_dev_key
      - GEMINI_API_KEY=your_gemini_api_key_here
    depends_on:
      - mongodb
    networks:
      - smartops_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartops_client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - smartops_network

volumes:
  mongo_data:

networks:
  smartops_network:
    driver: bridge
